name: Atualizar resultados do bolão

  on:
    schedule:
      - cron: "*/20 * * * *"
    workflow_dispatch:

  jobs:
    atualizar:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: "20"
        - run: npm install
        - name: Rodar o bot
          run: node bot-resultados.js
          env:
            FONTE: football-data
            FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
